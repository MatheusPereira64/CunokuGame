<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Carta de fundo -->
  <rect x="4" y="4" width="24" height="24" rx="3" ry="3" fill="url(#cardGradient)" stroke="url(#goldGradient)" stroke-width="1"/>
  
  <!-- Símbolo de espadas (♠) -->
  <g transform="translate(16,16)">
    <!-- Corpo da espada -->
    <path d="M0,-8 C-3,-5 -3,-2 0,0 C3,-2 3,-5 0,-8 Z" fill="url(#goldGradient)"/>
    <!-- Haste da espada -->
    <rect x="-0.5" y="0" width="1" height="4" fill="url(#goldGradient)"/>
    <!-- Base da espada -->
    <ellipse cx="0" cy="4" rx="2" ry="1" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Brilho sutil -->
  <rect x="4" y="4" width="24" height="24" rx="3" ry="3" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="0.5"/>
</svg>
